<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>

    <div class="container">
    <img src="banco.png" alt="Logo Banco" class="logo-banco">
    
    <h1>Simulador de Crédito</h1>
    </div>
    <div class="container">
        <h1>Simulador de Crédito</h1>

        <h2>Datos financieros</h2>
        
        <label for="txtIngresos">Ingresos mensuales ($):</label>
        <input type="text" id="txtIngresos" placeholder="Ej: 1500">

        <div class="seccion-egresos">
            <h3>Detalle de Gastos</h3>
            
            <label for="txtArriendo">Arriendo / Hipoteca ($):</label>
            <input type="text" id="txtArriendo" placeholder="Ej: 400">

            <label for="txtAlimentacion">Alimentación ($):</label>
            <input type="text" id="txtAlimentacion" placeholder="Ej: 250">

            <label for="txtVarios">Otros gastos (Varios) ($):</label>
            <input type="text" id="txtVarios" placeholder="Ej: 100">
        </div>

        <p>Disponible: <span id="spnDisponible">$0</span></p>
        <p>Capacidad de pago mensual (40%): <span id="spnCapacidadPago">$0</span></p>

        <hr>

        <h2>Solicitud de crédito</h2>
        <label for="txtMonto">Monto a solicitar ($):</label>
        <input type="text" id="txtMonto" placeholder="Ej: 5000">

        <label for="txtPlazo">Plazo en años:</label>
        <input type="text" id="txtPlazo" placeholder="Ej: 3">

        <label for="txtTasaInteres">Tasa de interés anual (%):</label>
        <input type="text" id="txtTasaInteres" placeholder="Ej: 12">

        <div class="resultados-finales">
            <p>Interés a pagar: <span id="spnInteresPagar">$0</span></p>
            <p>Total préstamo: <span id="spnTotalPrestamo">$0</span></p>
            <p><strong>Cuota mensual: <span id="spnCuotaMensual">$0.00</span></strong></p>
            <p>Estado de crédito: <span id="spnEstadoCredito" style="font-weight: bold;">ESPERANDO DATOS...</span></p>
        </div>

        <div class="buttons">
            <button id="btnCalcularCredito">Calcular Crédito</button>
            <button id="btnReiniciar">Reiniciar</button>
        </div>
    </div>

    <script src="simulador.js"></script>
</body>
</html>
